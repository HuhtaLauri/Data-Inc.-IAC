spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions,org.projectnessie.spark.extensions.NessieSparkSessionExtensions

spark.sql.catalog.nessie=org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.nessie.catalog-impl=org.apache.iceberg.nessie.NessieCatalog
spark.sql.catalog.nessie.uri=http://nessie:19120/api/v1
spark.sql.catalog.nessie.ref=main
spark.sql.catalog.nessie.warehouse=s3a://lakehouse/warehouse/

# Garage storage
spark.hadoop.fs.s3a.endpoint=http://garage:3900
spark.hadoop.fs.s3a.endpoint.region=garage
# Credentials are provided via container environment variables (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY)
spark.hadoop.fs.s3a.aws.credentials.provider=com.amazonaws.auth.EnvironmentVariableCredentialsProvider
spark.hadoop.fs.s3a.path.style.access=true
spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem

# Garage compatibility
spark.hadoop.fs.s3a.checksum.type=NONE
spark.hadoop.fs.s3a.etag.checksum.enabled=false
spark.hadoop.fs.s3a.multiobjectdelete.enable=false
spark.hadoop.fs.s3a.directory.marker.retention=keep
