services:

  master:
    image: apache/spark:3.5.1
    command:
      - /bin/bash
      - -lc
      - |
        set -euo pipefail
        test -f /opt/spark/jars/iceberg-spark-runtime-3.5_2.12-1.6.1.jar || curl -fsSLo /opt/spark/jars/iceberg-spark-runtime-3.5_2.12-1.6.1.jar https://repo1.maven.org/maven2/org/apache/iceberg/iceberg-spark-runtime-3.5_2.12/1.6.1/iceberg-spark-runtime-3.5_2.12-1.6.1.jar
        test -f /opt/spark/jars/nessie-spark-extensions-3.5_2.12-0.99.0.jar || curl -fsSLo /opt/spark/jars/nessie-spark-extensions-3.5_2.12-0.99.0.jar https://repo1.maven.org/maven2/org/projectnessie/nessie-integrations/nessie-spark-extensions-3.5_2.12/0.99.0/nessie-spark-extensions-3.5_2.12-0.99.0.jar
        test -f /opt/spark/jars/hadoop-aws-3.3.4.jar || curl -fsSLo /opt/spark/jars/hadoop-aws-3.3.4.jar https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-aws/3.3.4/hadoop-aws-3.3.4.jar
        test -f /opt/spark/jars/aws-java-sdk-bundle-1.12.262.jar || curl -fsSLo /opt/spark/jars/aws-java-sdk-bundle-1.12.262.jar https://repo1.maven.org/maven2/com/amazonaws/aws-java-sdk-bundle/1.12.262/aws-java-sdk-bundle-1.12.262.jar
        exec /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master -h 0.0.0.0
    hostname: master
    environment:
      MASTER: spark://master:7077
      SPARK_CONF_DIR: /opt/spark/conf
      GARAGE_KEY_ID: ${GARAGE_KEY_ID:-}
      GARAGE_SECRET_KEY: ${GARAGE_SECRET_KEY:-}
      AWS_ACCESS_KEY_ID: ${GARAGE_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${GARAGE_SECRET_KEY:-}
      SPARK_PUBLIC_DNS: ${EXTERNAL_IP}
    volumes:
      - /root/spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    networks:
      traefik-public:
        aliases:
          - spark-master
    ports:
      - 4040:4040
      - 6066:6066
      - 7077:7077
      - 8080:8080
    deploy:
      placement:
        constraints:
          - node.role == manager
          - node.labels.spark.spark-data == true
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.constraint-label=traefik-public
        - traefik.http.routers.spark-http.rule=Host(`${DOMAIN?Variable not set}`)
        - traefik.http.routers.spark-http.entrypoints=http
        - traefik.http.routers.spark-http.middlewares=https-redirect
        - traefik.http.routers.spark-https.rule=Host(`${DOMAIN?Variable not set}`)
        - traefik.http.routers.spark-https.entrypoints=https
        - traefik.http.routers.spark-https.tls=true
        - traefik.http.routers.spark-https.tls.certresolver=le
        - traefik.http.services.spark.loadbalancer.server.port=8080
        - traefik.http.routers.spark-https.middlewares=admin-auth@docker

  worker:
    image: apache/spark:3.5.1
    command:
      - /bin/bash
      - -lc
      - |
        set -euo pipefail
        test -f /opt/spark/jars/iceberg-spark-runtime-3.5_2.12-1.6.1.jar || curl -fsSLo /opt/spark/jars/iceberg-spark-runtime-3.5_2.12-1.6.1.jar https://repo1.maven.org/maven2/org/apache/iceberg/iceberg-spark-runtime-3.5_2.12/1.6.1/iceberg-spark-runtime-3.5_2.12-1.6.1.jar
        test -f /opt/spark/jars/nessie-spark-extensions-3.5_2.12-0.99.0.jar || curl -fsSLo /opt/spark/jars/nessie-spark-extensions-3.5_2.12-0.99.0.jar https://repo1.maven.org/maven2/org/projectnessie/nessie-integrations/nessie-spark-extensions-3.5_2.12/0.99.0/nessie-spark-extensions-3.5_2.12-0.99.0.jar
        test -f /opt/spark/jars/hadoop-aws-3.3.4.jar || curl -fsSLo /opt/spark/jars/hadoop-aws-3.3.4.jar https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-aws/3.3.4/hadoop-aws-3.3.4.jar
        test -f /opt/spark/jars/aws-java-sdk-bundle-1.12.262.jar || curl -fsSLo /opt/spark/jars/aws-java-sdk-bundle-1.12.262.jar https://repo1.maven.org/maven2/com/amazonaws/aws-java-sdk-bundle/1.12.262/aws-java-sdk-bundle-1.12.262.jar
        exec /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://master:7077
    hostname: worker
    environment:
      SPARK_CONF_DIR: /opt/spark/conf
      GARAGE_KEY_ID: ${GARAGE_KEY_ID:-}
      GARAGE_SECRET_KEY: ${GARAGE_SECRET_KEY:-}
      AWS_ACCESS_KEY_ID: ${GARAGE_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${GARAGE_SECRET_KEY:-}
      SPARK_WORKER_CORES: 3
      SPARK_WORKER_MEMORY: 4g
      SPARK_PUBLIC_DNS: ${EXTERNAL_IP}
    volumes:
      - /root/spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    depends_on:
      - master
    networks:
      - worker-network
      - traefik-public
    ports:
      - 8081:8081
    deploy:
      mode: global
      placement:
        constraints:
          - node.role == worker

  thrift:
    image: apache/spark:3.5.1
    user: root
    networks:
      - traefik-public
    ports:
      # For dbt / JDBC clients (HiveServer2 / Spark Thrift Server)
      - 10000:10000
      # Optional: UI for the thriftserver application (also routed via Traefik)
      - 4041:4040
    command:
      - /bin/bash
      - -lc
      - |
        set -euo pipefail
        test -f /opt/spark/jars/iceberg-spark-runtime-3.5_2.12-1.6.1.jar || curl -fsSLo /opt/spark/jars/iceberg-spark-runtime-3.5_2.12-1.6.1.jar https://repo1.maven.org/maven2/org/apache/iceberg/iceberg-spark-runtime-3.5_2.12/1.6.1/iceberg-spark-runtime-3.5_2.12-1.6.1.jar
        test -f /opt/spark/jars/nessie-spark-extensions-3.5_2.12-0.99.0.jar || curl -fsSLo /opt/spark/jars/nessie-spark-extensions-3.5_2.12-0.99.0.jar https://repo1.maven.org/maven2/org/projectnessie/nessie-integrations/nessie-spark-extensions-3.5_2.12/0.99.0/nessie-spark-extensions-3.5_2.12-0.99.0.jar
        test -f /opt/spark/jars/hadoop-aws-3.3.4.jar || curl -fsSLo /opt/spark/jars/hadoop-aws-3.3.4.jar https://repo1.maven.org/maven2/org/apache/hadoop/hadoop-aws/3.3.4/hadoop-aws-3.3.4.jar
        test -f /opt/spark/jars/aws-java-sdk-bundle-1.12.262.jar || curl -fsSLo /opt/spark/jars/aws-java-sdk-bundle-1.12.262.jar https://repo1.maven.org/maven2/com/amazonaws/aws-java-sdk-bundle/1.12.262/aws-java-sdk-bundle-1.12.262.jar
        /opt/spark/sbin/start-thriftserver.sh \
          --master spark://spark-master:7077 \
          --conf spark.ui.enabled=true \
          --conf spark.sql.ui.enabled=true \
          --conf spark.cores.max=3 \
          --executor-cores 1 \
          --hiveconf hive.server2.thrift.bind.host=0.0.0.0 \
          --hiveconf hive.server2.thrift.port=10000
        tail -F /opt/spark/logs/* 2>/dev/null || tail -f /dev/null
    environment:
      SPARK_CONF_DIR: /opt/spark/conf
      THRIFT_UI_DOMAIN: ${THRIFT_UI_DOMAIN:-}
      GARAGE_KEY_ID: ${GARAGE_KEY_ID:-}
      GARAGE_SECRET_KEY: ${GARAGE_SECRET_KEY:-}
      AWS_ACCESS_KEY_ID: ${GARAGE_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${GARAGE_SECRET_KEY:-}
    depends_on:
      - master
    volumes:
      - /root/spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      placement:
        constraints:
          - node.role == manager
          - node.labels.spark.spark-data == true
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.constraint-label=traefik-public
        - traefik.http.routers.thrift-http.rule=Host(`${THRIFT_UI_DOMAIN?Variable not set}`)
        - traefik.http.routers.thrift-http.entrypoints=http
        - traefik.http.routers.thrift-http.middlewares=https-redirect
        - traefik.http.routers.thrift-https.rule=Host(`${THRIFT_UI_DOMAIN?Variable not set}`)
        - traefik.http.routers.thrift-https.entrypoints=https
        - traefik.http.routers.thrift-https.tls=true
        - traefik.http.routers.thrift-https.tls.certresolver=le
        - traefik.http.services.thrift.loadbalancer.server.port=4040
        - traefik.http.routers.thrift-https.middlewares=admin-auth@docker

networks:
  worker-network:
    attachable: true
  traefik-public:
    external: true

volumes:
  spark-data:
