services:

  master:
    image: apache/spark:4.0.0
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master", "-h", "0.0.0.0"]
    hostname: master
    environment:
      MASTER: spark://master:7077
      SPARK_CONF_DIR: /conf
      SPARK_PUBLIC_DNS: ${EXTERNAL_IP}
    networks:
      traefik-public:
        aliases:
          - spark-master
    ports:
      - 4040:4040
      - 6066:6066
      - 7077:7077
      - 8080:8080
    deploy:
      placement:
        constraints:
          - node.role == manager
          - node.labels.spark.spark-data == true
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.constraint-label=traefik-public
        - traefik.http.routers.spark-http.rule=Host(`${DOMAIN?Variable not set}`)
        - traefik.http.routers.spark-http.entrypoints=http
        - traefik.http.routers.spark-http.middlewares=https-redirect
        - traefik.http.routers.spark-https.rule=Host(`${DOMAIN?Variable not set}`)
        - traefik.http.routers.spark-https.entrypoints=https
        - traefik.http.routers.spark-https.tls=true
        - traefik.http.routers.spark-https.tls.certresolver=le
        - traefik.http.services.spark.loadbalancer.server.port=8080
        - traefik.http.routers.spark-https.middlewares=admin-auth@docker

  worker:
    image: apache/spark:4.0.0
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://master:7077"]
    hostname: worker
    environment:
      SPARK_CONF_DIR: /conf
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 4g
      SPARK_PUBLIC_DNS: ${EXTERNAL_IP}
    depends_on:
      - master
    networks:
      - worker-network
      - traefik-public
    ports:
      - 8081:8081
    deploy:
      mode: global
      placement:
        constraints:
          - node.role == worker

  thrift:
    image: apache/spark:4.0.0
    user: root
    networks:
      - traefik-public
    ports:
      # For dbt / JDBC clients (HiveServer2 / Spark Thrift Server)
      - 10000:10000
      # Optional: UI for the thriftserver application
      - 4041:4040
    command:
      - /bin/bash
      - -lc
      - |
        set -euo pipefail
        /opt/spark/sbin/start-thriftserver.sh \
          --master spark://spark-master:7077 \
          --hiveconf hive.server2.thrift.bind.host=0.0.0.0 \
          --hiveconf hive.server2.thrift.port=10000
        tail -F /opt/spark/logs/* 2>/dev/null || tail -f /dev/null
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      placement:
        constraints:
          - node.role == manager
          - node.labels.spark.spark-data == true

networks:
  worker-network:
    attachable: true
  traefik-public:
    external: true

volumes:
  spark-data:
