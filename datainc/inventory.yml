master:
  hosts:
    datainc-1:
      ansible_host: datainc-1
      ansible_user: root
      ansible_ssh_private_key_file: ~/.ssh/id_rsa
      ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

worker:
  hosts:
    datainc-2:
      ansible_host: datainc-2
      ansible_user: root
      ansible_ssh_private_key_file: ~/.ssh/id_rsa
      ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
    datainc-3:
      ansible_host: datainc-3
      ansible_user: root
